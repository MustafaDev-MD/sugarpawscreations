name: tests

on:
  push:
    branches:
      - main
      - master
      - develop
      - workos

  pull_request:
    branches:
      - main
      - master
      - develop
      - workos

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pdo_mysql, mbstring, bcmath
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Install NPM Dependencies
        run: npm ci

      - name: Create Environment
        run: |
          cp .env.example .env

          echo "APP_ENV=testing" >> .env
          echo "APP_KEY=base64:SomeRandom32CharacterLongKeyHere123456789=" >> .env

          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      - name: Generate Key
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan key:generate

      - name: Debug Environment
        run: |
          echo "===== .env ====="
          grep DB_ .env || true

          echo ""
          echo "===== Laravel Config ====="
          php artisan tinker --execute="dump(config('database.default'));"
          php artisan tinker --execute="dump(config('database.connections.mysql.host'));"
          php artisan tinker --execute="dump(env('DB_HOST'));"

      - name: Debug DB Config
        run: |
          php artisan tinker --execute="dump(config('database.default'));"
          php artisan tinker --execute="dump(config('database.connections.mysql.host'));"

      - name: Wait For MySQL
        run: |
          sleep 20
          mysql -h127.0.0.1 -uroot -proot -e "SHOW DATABASES;"

      - name: Debug DB
        run: |
          php artisan about | grep Database || true

          php artisan tinker --execute="
          dump(env('DB_HOST'));
          dump(env('DB_DATABASE'));
          dump(env('DB_USERNAME'));
          dump(env('DB_PASSWORD'));
          "

      - name: Run Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate:fresh --force

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test