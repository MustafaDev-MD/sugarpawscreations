name: tests

on:
  push:
    branches:
      - main
      - master
      - develop
      - workos

  pull_request:
    branches:
      - main
      - master
      - develop
      - workos

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pdo_mysql, mbstring, bcmath
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Install NPM Dependencies
        run: npm ci

      - name: Create Environment
        run: cp .env.example .env

      - name: Run Migrations
        run: php artisan migrate:fresh --force

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: php artisan test